name: Friday Release Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 5"
      timezone: "America/Los_Angeles"

concurrency:
  group: friday-release-radar
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RELEASE_RADAR_CACHE_VERSION: v2
      SPOTIFY_RADAR_TIMEZONE: America/Los_Angeles
      SPOTIFY_RADAR_CACHE_DIR: .release-radar-cache
      SPOTIFY_PLAYLIST_NAME: Weekly Release Radar
      SPOTIFY_MIN_SAVED_TRACKS_PER_ARTIST: "2"
      GITHUB_SECRETS_WRITE_TOKEN: ${{ secrets.GITHUB_SECRETS_WRITE_TOKEN }}
      SPOTIFY_PLAYLIST_ID: ${{ secrets.SPOTIFY_PLAYLIST_ID }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore Release Radar cache
        uses: actions/cache/restore@v4
        with:
          path: .release-radar-cache
          key: release-radar-${{ runner.os }}-${{ env.RELEASE_RADAR_CACHE_VERSION }}-${{ github.run_id }}
          restore-keys: |
            release-radar-${{ runner.os }}-${{ env.RELEASE_RADAR_CACHE_VERSION }}-

      - name: Ensure runner dependencies
        shell: bash
        run: |
          missing_packages=()
          command -v gh >/dev/null 2>&1 || missing_packages+=("gh")
          command -v jq >/dev/null 2>&1 || missing_packages+=("jq")
          command -v zsh >/dev/null 2>&1 || missing_packages+=("zsh")
          if [ "${#missing_packages[@]}" -gt 0 ]; then
            sudo apt-get update
            sudo apt-get install -y "${missing_packages[@]}"
          fi

      - name: Validate Spotify secrets
        shell: bash
        run: |
          if [ -z "$SPOTIFY_CLIENT_ID" ] || [ -z "$SPOTIFY_REFRESH_TOKEN" ]; then
            echo "Missing required GitHub Actions secrets: SPOTIFY_CLIENT_ID and/or SPOTIFY_REFRESH_TOKEN" >&2
            exit 1
          fi

      - name: Write runtime config
        shell: bash
        run: |
          jq -n \
            --arg client_id "$SPOTIFY_CLIENT_ID" \
            --arg refresh_token "$SPOTIFY_REFRESH_TOKEN" \
            --arg playlist_id "$SPOTIFY_PLAYLIST_ID" \
            --arg playlist_name "$SPOTIFY_PLAYLIST_NAME" \
            --argjson minimum_saved_tracks_per_artist "$SPOTIFY_MIN_SAVED_TRACKS_PER_ARTIST" \
            '{
              client_id: $client_id,
              refresh_token: $refresh_token,
              playlist_id: $playlist_id,
              playlist_name: $playlist_name,
              minimum_saved_tracks_per_artist: $minimum_saved_tracks_per_artist,
              release_day: "FRIDAY"
            }' > .release-radar.json

      - name: Run automatic Friday update
        shell: bash
        run: |
          set -o pipefail
          ./release-radar.sh 2>&1 | tee release-radar-run.log

      - name: Rotate GitHub refresh token secret when Spotify issues a new one
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_SECRETS_WRITE_TOKEN }}
        run: |
          if [ ! -f .release-radar.json ]; then
            echo "No runtime config found, so there is no refresh token to rotate." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ -z "$GH_TOKEN" ]; then
            echo "Skipping refresh-token secret rotation because GITHUB_SECRETS_WRITE_TOKEN is not configured." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          runtime_refresh_token="$(jq -r '.refresh_token // empty' .release-radar.json)"

          if [ -z "$runtime_refresh_token" ]; then
            echo "Runtime config did not contain a refresh token to rotate." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$runtime_refresh_token" = "$SPOTIFY_REFRESH_TOKEN" ]; then
            echo "Spotify refresh token did not rotate during this run." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          printf '%s' "$runtime_refresh_token" | gh secret set SPOTIFY_REFRESH_TOKEN --repo "$GITHUB_REPOSITORY" --body-file -
          echo "Updated the SPOTIFY_REFRESH_TOKEN repository secret from the token returned during this run." >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize playlist details
        if: always()
        shell: bash
        run: |
          if [ -f .release-radar.json ]; then
            playlist_id="$(jq -r '.playlist_id // empty' .release-radar.json)"
            playlist_name="$(jq -r '.playlist_name // empty' .release-radar.json)"
            if [ -n "$playlist_name" ]; then
              echo "## Release Radar run" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "- Playlist name: $playlist_name" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ -n "$playlist_id" ]; then
              echo "- Playlist ID: \`$playlist_id\`" >> "$GITHUB_STEP_SUMMARY"
              echo "- Recommended next step: save this as the \`SPOTIFY_PLAYLIST_ID\` repository secret so future runs always target the same playlist." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          if [ -f release-radar-run.log ]; then
            window="$(grep '^Window:' release-radar-run.log | tail -n 1 | sed 's/^Window: //' || true)"
            tracks_added="$(grep '^Tracks added:' release-radar-run.log | tail -n 1 | sed 's/^Tracks added: //' || true)"
            playlist_url="$(grep '^Open:' release-radar-run.log | tail -n 1 | sed 's/^Open: //' || true)"
            if [ -n "$window" ] || [ -n "$tracks_added" ] || [ -n "$playlist_url" ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ -n "$window" ]; then
              echo "- Window: $window" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ -n "$tracks_added" ]; then
              echo "- Tracks added: $tracks_added" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ -n "$playlist_url" ]; then
              echo "- Playlist URL: $playlist_url" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-radar-run-log
          path: release-radar-run.log
          if-no-files-found: ignore

      - name: Save Release Radar cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .release-radar-cache
          key: release-radar-${{ runner.os }}-${{ env.RELEASE_RADAR_CACHE_VERSION }}-${{ github.run_id }}
